databases:
  # 1. PostgreSQL Database Service
  - name: contract-review-db
    plan: free
    ipAllowList: [] # Allows access from other Render services only

services:
  # 2. FastAPI Backend Service
  - type: web
    name: ai-contract-review-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contract-review-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render Dashboard
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: UPLOAD_DIR
        value: uploads

  # 3. Next.js Frontend Service
  - type: web
    name: ai-contract-review-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ai-contract-review-backend
          property: host
